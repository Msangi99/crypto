# API: api.cryptoloanboost.com → Docker clb-backend (127.0.0.1:3001)
# Install: sudo cp deploy/nginx/api.cryptoloanboost.com.conf /etc/nginx/sites-available/api.cryptoloanboost.com && sudo nginx -t && sudo systemctl reload nginx
#
# Large APK uploads (admin mobile releases) require a body limit above nginx default (1m).
server {
    server_name api.cryptoloanboost.com;

    client_max_body_size 200m;
    client_body_timeout 600s;
    send_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Stream large bodies to Node instead of buffering the whole file in nginx RAM.
        proxy_request_buffering off;
        proxy_buffering off;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/cryptoloanboost.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cryptoloanboost.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.cryptoloanboost.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
