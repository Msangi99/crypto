# App dApp: app.cryptoloanboost.com → Docker clb-dapp (127.0.0.1:3003)
# Install: sudo cp deploy/nginx/app.cryptoloanboost.com.conf /etc/nginx/sites-available/app.cryptoloanboost.com && sudo nginx -t && sudo systemctl reload nginx
server {
    server_name app.cryptoloanboost.com;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # dApp HTML updates often; reduce stale browser copies after redeploy
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/cryptoloanboost.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cryptoloanboost.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name app.cryptoloanboost.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
