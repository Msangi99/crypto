# WhatsApp bot: bot.cryptoloanboost.com → Docker clb-whatsapp (127.0.0.1:8085)
# QR setup: https://bot.cryptoloanboost.com/setup
# Install:
#   sudo cp deploy/nginx/bot.cryptoloanboost.com.conf /etc/nginx/sites-available/bot.cryptoloanboost.com
#   sudo ln -sf /etc/nginx/sites-available/bot.cryptoloanboost.com /etc/nginx/sites-enabled/
#   sudo certbot certonly --cert-name cryptoloanboost.com --nginx \
#     -d cryptoloanboost.com -d api.cryptoloanboost.com -d app.cryptoloanboost.com -d bot.cryptoloanboost.com
#   sudo nginx -t && sudo systemctl reload nginx
server {
    server_name bot.cryptoloanboost.com;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/cryptoloanboost.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cryptoloanboost.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    listen [::]:80;
    server_name bot.cryptoloanboost.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
