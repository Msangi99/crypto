services:
  # ─── PostgreSQL Database ─────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: clb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: clb_user
      POSTGRES_PASSWORD: clb_secure_pass_2024
      POSTGRES_DB: clb_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clb_user -d clb_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (Fastify API) ──────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clb-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://clb_user:clb_secure_pass_2024@postgres:5432/clb_db?schema=public"
      PORT: "3000"
      HOST: "0.0.0.0"
      NODE_ENV: "production"
      JWT_SECRET: "${JWT_SECRET:-your-super-secret-jwt-key-change-this-in-production}"
      BSC_RPC_URL: "${BSC_RPC_URL:-https://bsc-dataseed1.binance.org}"
      BSC_TESTNET_RPC_URL: "${BSC_TESTNET_RPC_URL:-https://data-seed-prebsc-1-s1.binance.org:8545}"
      CHAIN_ID: "${CHAIN_ID:-97}"
      POOL_MANAGER_CONTRACT: "${POOL_MANAGER_CONTRACT:-0x5fA4d61B529F88069a46B83451540aC4c2f96200}"
      PRIVATE_KEY: "${PRIVATE_KEY:-83e593f03ae38316792916bad70d35fb8b3045a668322f8f33ffde8826bcf943}"
      COINGECKO_API_URL: "${COINGECKO_API_URL:-https://api.coingecko.com/api/v3}"
      CLB_TOKEN_ADDRESS: "${CLB_TOKEN_ADDRESS:-}"
      # Path *inside* the container (mounted from ./contracts/abi below)
      CLB_TOKEN_ABI_PATH: "${CLB_TOKEN_ABI_PATH:-/app/contracts/abi/CLBToken.json}"
      WHATSAPP_NOTIFY_URL: "${WHATSAPP_NOTIFY_URL:-http://whatsapp-notification:8080}"
      WHATSAPP_NOTIFY_SECRET: "${WHATSAPP_NOTIFY_SECRET:-}"
      ADMIN_DASHBOARD_URL: "${ADMIN_DASHBOARD_URL:-https://cryptoloanboost.com/dashboard}"
    volumes:
      - ./contracts/abi:/app/contracts/abi:ro
      - backend_uploads:/app/uploads
    ports:
      - "127.0.0.1:3001:3000"

  # ─── Frontend (Next.js Admin) ───────────────────────
  frontend:
    build:
      context: ./clb-admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "https://api.cryptoloanboost.com"
    container_name: clb-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:3002:3000"

  # ─── Public dApp (static HTML at app.cryptoloanboost.com) ──
  dapp:
    build:
      context: ./app.cryptoloanboost.com
      dockerfile: Dockerfile
    container_name: clb-dapp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3003:80"

  # ─── Admin WhatsApp alerts (Baileys — scan QR once at /setup) ──
  whatsapp-notification:
    build:
      context: ./whatsapp-notification
      dockerfile: Dockerfile
    container_name: clb-whatsapp
    restart: unless-stopped
    environment:
      PORT: "8080"
      HOST: "0.0.0.0"
      WHATSAPP_AUTH_DIR: "/app/auth_state"
      ADMIN_WHATSAPP_NUMBER: "${ADMIN_WHATSAPP_NUMBER:-}"
      WHATSAPP_NOTIFY_SECRET: "${WHATSAPP_NOTIFY_SECRET:-}"
      ADMIN_DASHBOARD_URL: "${ADMIN_DASHBOARD_URL:-https://cryptoloanboost.com/dashboard}"
    volumes:
      - whatsapp_auth:/app/auth_state
    ports:
      - "127.0.0.1:8085:8080"

volumes:
  postgres_data:
  whatsapp_auth:
  backend_uploads:
